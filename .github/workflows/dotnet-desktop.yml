name: ci

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: 8.0.x
  SOLUTION_PATH: TrailMateCenter.sln
  APP_PROJECT_PATH: src/TrailMateCenter.App/TrailMateCenter.App.csproj
  TEST_PROJECT_PATH: tests/TrailMateCenter.Tests/TrailMateCenter.Tests.csproj
  BUILD_CONFIGURATION: Release

jobs:
  validate:
    name: Format, Build, and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: |
            **/*.csproj

      - name: Restore solution
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Verify formatting
        run: dotnet format ${{ env.SOLUTION_PATH }} --verify-no-changes --no-restore

      - name: Build desktop app
        run: dotnet build ${{ env.APP_PROJECT_PATH }} -c ${{ env.BUILD_CONFIGURATION }} --no-restore

      - name: Run unit tests
        run: dotnet test ${{ env.TEST_PROJECT_PATH }} -c ${{ env.BUILD_CONFIGURATION }} --no-restore

  publish:
    name: Publish ${{ matrix.rid }}
    needs: validate
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            archive_name: TrailMateCenter.App-win-x64.zip
          - os: ubuntu-latest
            rid: linux-x64
            archive_name: TrailMateCenter.App-linux-x64.tar.gz
          - os: macos-latest
            rid: osx-x64
            archive_name: TrailMateCenter.App-osx-x64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: |
            **/*.csproj

      - name: Restore desktop app for target runtime
        run: dotnet restore ${{ env.APP_PROJECT_PATH }} -r ${{ matrix.rid }}

      - name: Publish desktop app
        run: >
          dotnet publish ${{ env.APP_PROJECT_PATH }}
          -c ${{ env.BUILD_CONFIGURATION }}
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=false
          --no-restore
          -o artifacts/publish/${{ matrix.rid }}

      - name: Archive publish output (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $publishDir = "artifacts/publish/${{ matrix.rid }}"
          $archivePath = "artifacts/packages/${{ matrix.archive_name }}"
          New-Item -ItemType Directory -Force -Path "artifacts/packages" | Out-Null
          Compress-Archive -Path "$publishDir/*" -DestinationPath $archivePath -Force

      - name: Archive publish output (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          publish_dir="artifacts/publish/${{ matrix.rid }}"
          archive_path="artifacts/packages/${{ matrix.archive_name }}"
          mkdir -p artifacts/packages
          tar -C "$publish_dir" -czf "$archive_path" .

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.rid }}
          path: artifacts/packages/${{ matrix.archive_name }}
          if-no-files-found: error
          retention-days: 14
